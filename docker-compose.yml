# TCM Intelligent Inquiry — 生产向一键编排
# 说明：业务库使用 MySQL（与主工程 JPA 配置一致）；向量检索依赖 Redis Stack（含 RediSearch）。
#
# 代理：若 DashScope / OpenAI 兼容接口需翻墙，请在宿主机或 compose 环境变量中设置 HTTP_PROXY / HTTPS_PROXY。
#
# 启动：./deploy.sh  或  docker compose up -d --build

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-tcmroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tcm_inquiry}
      MYSQL_USER: ${MYSQL_USER:-tcm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tcmpass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - tcm_mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - tcm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tcm_inquiry}
      MYSQL_USER: ${MYSQL_USER:-tcm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tcmpass}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,mysql,redis,backend,frontend}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  tcm_mysql_data:
  tcm_redis_data:
