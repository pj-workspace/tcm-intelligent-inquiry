name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-unit:
    name: Backend unit tests (no live LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Maven test (exclude DashScope live IT)
        working-directory: backend
        run: ./mvnw -B test -ntp -Dtest='!com.tcm.inquiry.integration.DashScopeLiveIntegrationTest'

  frontend:
    name: Frontend lint, test, audit, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci, lint, test, audit, build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm test
          npm audit --audit-level=high --registry=https://registry.npmjs.org
          npm run build
