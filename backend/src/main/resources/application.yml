server:
  port: 8080

spring:
  application:
    name: tcm-inquiry-backend
  # —— 业务数据：MySQL（禁止 SQLite）。本地可用 docker-compose 中的 MySQL 服务。 ——
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:tcm_inquiry}?createDatabaseIfNotExist=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  mvc:
    async:
      request-timeout: 600000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  # —— Redis Stack：向量索引 + 相似度检索（需 RediSearch 模块，镜像 redis/redis-stack-server） ——
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      timeout: 10s

  ai:
    # 向量库 schema 与索引名；具体 VectorStore Bean 见 RedisStackVectorStoreConfig
    vectorstore:
      redis:
        initialize-schema: true
        index-name: tcm-spring-ai-index
        prefix: "tcm:emb:"
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: deepseek-r1:8b
      embedding:
        options:
          model: bge-m3:latest

tcm:
  api:
    expose-error-details: true
    cors-allowed-origin-patterns:
      - "*"
  knowledge:
    chunk-size: 512
    min-chunk-size-chars: 60
    min-chunk-length-to-embed: 20
    max-num-chunks: 5000
    keep-separator: true
    default-top-k: 4
    default-similarity-threshold: 0.0
    storage-dir: data/kb-files
  literature:
    storage-dir: data/literature-files
  ollama:
    vision-model: qwen3-vl:2b
  # 文本智能体：是否启用 Spring AI 工具循环（knowledge_retrieval_tool + herb_image_recognition_tool）
  agent:
    enable-react-tools: true
